# golangci-lint v2 configuration for Fleet Commander.
# Run locally:  golangci-lint run ./...
# CI runs the same config — this file is the single source of truth.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # Start from nothing, then explicitly enable. Stops surprise breakage
  # when golangci-lint adds new defaults.
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unparam
    - gocritic
    - gosec
    - revive
    - gocyclo

  settings:
    gocyclo:
      min-complexity: 20
    errcheck:
      # Best-effort writes are commonly unchecked; let those slide.
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*os/exec.Cmd).Start
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    gosec:
      excludes:
        # G104 = unchecked errors (duplicates errcheck).
        - G104
        # G204 = subprocess launched with variable. We invoke git/tmux with
        # known argv; not building shell strings.
        - G204
        # G404 = math/rand for non-crypto. Acceptable for retry jitter etc.
        - G404
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true # exported-without-comment is noisy in this codebase.

  exclusions:
    rules:
      # Test files legitimately ignore errors and have higher complexity.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocyclo
          - unparam
      # The webdist embed file is generated/glue code.
      - path: cmd/fleet/embed\.go
        linters:
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
