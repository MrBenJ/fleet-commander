# Fleet Commander tmux config
# Loaded automatically for fleet sessions

# Status bar shows fleet info
set-option -g status-left "[Fleet: #S] "
set-option -g status-left-length 30
set-option -g status-style "bg=#333333,fg=#7D56F4"
set-option -g status-right "C-b q: queue | C-b d: detach"
set-option -g status-right-length 45

# Ctrl+B, Q → detach (fleet queue loop will catch this)
bind-key q detach-client

# Ctrl+B, D → full detach (exits the queue loop too)
# This is standard tmux detach — no changes needed
